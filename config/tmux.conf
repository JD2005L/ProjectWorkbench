# Project Workbench tmux config (installed as /home/admin/.tmux.conf).
# Without `mouse on`, the wheel is forwarded to the running program, which
# usually maps it to Up/Down — so wheel-up in bash recalls the previous
# command instead of scrolling the pane's scrollback.
set -g mouse on

# Default is 2000. New windows created after this is set use the new value;
# existing windows keep their old buffer.
set -g history-limit 50000
