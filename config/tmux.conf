# Project Workbench tmux config (installed as /home/admin/.tmux.conf).
# Without `mouse on`, the wheel is forwarded to the running program, which
# usually maps it to Up/Down — so wheel-up in Claude/bash recalls the previous
# prompt instead of scrolling the pane's scrollback.
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g status off
set -g escape-time 0
set -g focus-events on
setw -g aggressive-resize on
setw -g xterm-keys on

set -g set-clipboard on

# Disable right-click context menu — it conflicts with the browser's native
# right-click menu and can crash the ttyd session.
unbind-key -n MouseDown3Pane
