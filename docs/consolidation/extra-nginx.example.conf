# Example PW_EXTRA_NGINX file (env-specific sibling-app reverse proxies).
#
# The Project Workbench nginx generator injects the contents of the file pointed
# to by PW_EXTRA_NGINX (default /etc/project-workbench/extra-nginx.conf) verbatim
# into the generated `server { }` block, ahead of the catch-all `location /`.
# This keeps deployment-specific service names OUT of the common repo: a site
# drops the locations it needs here and runs "Regenerate nginx" (or restarts the
# app). nginx -t validates the result and the previous config is restored on any
# error, so a typo can never brick the reverse proxy.
#
# This example mirrors the GOA (vnl2422) deployment's sibling containers. Adjust
# ports/hosts for your environment; a non-AD / PVI install simply omits the file.
#
# NOTE on /pulse/admin: it uses PW's internal /pw-auth-check auth_request and the
# X-PW-User response header. For that header to be present, run the app with
# PW_SSO_USER_HEADER=X-PW-User (see the optional sibling-app SSO in the auth
# config). The 302 login target must match your PW_BASE_PATH (here /workbench).

    # n8n automation (own container on :5678)
    location /n8n/ {
        proxy_pass http://127.0.0.1:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # TeamKB knowledge base (own container on :3100)
    location /teamkb/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        client_max_body_size 32m;
    }

    # Visual Identity demo + MCP (own container on :3200, open)
    location /visual-identity/ {
        proxy_pass http://127.0.0.1:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Pulse leadership dashboard (own container on :3300)
    # Private admin area — gated by PW/AD login via auth_request; the signed-in
    # username is forwarded to Pulse as X-Pulse-User (Pulse enforces its allowlist).
    location @pulse_login {
        return 302 /workbench/login?next=/pulse/admin;
    }
    location /pulse/admin {
        auth_request /pw-auth-check;
        error_page 401 = @pulse_login;
        auth_request_set $pulse_user $upstream_http_x_pw_user;
        proxy_set_header X-Pulse-User $pulse_user;
        proxy_pass http://127.0.0.1:3300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
    }
    # Public dashboard + open MCP submission endpoint (no auth).
    location /pulse/ {
        proxy_pass http://127.0.0.1:3300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        client_max_body_size 32m;
    }
